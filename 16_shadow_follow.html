<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Shadow Follow</title>
    <style>
        body { background: #f1f5f9; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; margin: 0; }
        h1 {
            font-size: 5rem; font-family: sans-serif; color: #1e293b;
            user-select: none; transition: text-shadow 0.1s;
        }
    </style>
</head>
<body>
    <h1 id="text">PÄIKE</h1>
    <script>
        const text = document.getElementById('text');
        window.addEventListener('mousemove', (e) => {
            const rect = text.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // Вычисляем вектор от центра текста до мыши
            const diffX = (centerX - e.clientX) / 10; 
            const diffY = (centerY - e.clientY) / 10;

            text.style.textShadow = `${diffX}px ${diffY}px 15px rgba(0,0,0,0.3)`;
        });
    </script>
</body>
</html>
