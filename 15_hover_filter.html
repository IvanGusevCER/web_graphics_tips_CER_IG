<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Filter Swap</title>
    <style>
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box {
            width: 300px; height: 300px;
            background: url('https://picsum.photos/400') center/cover;
            border: 5px solid white;
            filter: grayscale(100%);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .box:hover {
            filter: grayscale(0%) invert(100%) hue-rotate(180deg);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
