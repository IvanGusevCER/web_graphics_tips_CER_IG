<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Scroll Scaling</title>
    <style>
        body { margin: 0; height: 300vh; background: #0f172a; font-family: sans-serif; }
        .viewport { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .box {
            width: 100px; height: 100px; background: #fbbf24; border-radius: 20px;
            display: flex; justify-content: center; align-items: center; font-weight: bold;
            transition: transform 0.1s ease-out;
        }
        .info { position: fixed; bottom: 20px; color: white; width: 100%; text-align: center; }
    </style>
</head>
<body>
    <div class="viewport">
        <div id="scalingBox" class="box">SCROLL</div>
    </div>
    <div class="info">Keri alla, et näha efekti</div>

    <script>
        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / (document.body.offsetHeight - window.innerHeight);
            const scale = 1 + (scrollPercent * 10); // Увеличиваем до 10 раз
            const rotation = scrollPercent * 360;   // Добавим немного вращения для красоты
            
            const box = document.getElementById('scalingBox');
            box.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
        });
    </script>
</body>
</html>
