<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Pac-Man Mäng</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; }
        #game-container { position: relative; width: 600px; height: 400px; border: 4px solid #2427ff; background: #000; margin-top: 20px; overflow: hidden; }
        
        /* Пакман через SVG */
        #pacman { position: absolute; width: 40px; height: 40px; z-index: 10; transition: transform 0.1s; }
        
        /* Призрак через SVG */
        .ghost { position: absolute; width: 40px; height: 40px; z-index: 9; transition: all 0.2s linear; }
        
        /* Еда */
        .dot { position: absolute; width: 8px; height: 8px; background: #ffb8ae; border-radius: 50%; z-index: 5; }
        
        .score { font-size: 24px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="score">Skoor: <span id="scoreVal">0</span></div>
    <div id="game-container">
	
<div id="pacman">
    <img src="packman.svg" width="40" height="40" alt="Pacman">
</div>

        <div id="ghost" class="ghost">
            <svg viewBox="0 0 100 100">
                <path d="M10 90 L10 40 A40 40 0 1 1 90 40 L90 90 L75 80 L60 90 L45 80 L30 90 L15 80 Z" fill="red" />
                <circle cx="35" cy="40" r="8" fill="white" />
                <circle cx="65" cy="40" r="8" fill="white" />
            </svg>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const pacman = document.getElementById('pacman');
        const ghost = document.getElementById('ghost');
        const scoreElement = document.getElementById('scoreVal');

        let score = 0;
        let pPos = { x: 50, y: 50, dir: 0 };
        let gPos = { x: 500, y: 300 };
        const speed = 20;

        // Создаем "еду" (точки)
        function createDots() {
            for (let i = 0; i < 50; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.style.left = Math.random() * 560 + 20 + 'px';
                dot.style.top = Math.random() * 360 + 20 + 'px';
                container.appendChild(dot);
            }
        }
        createDots();

        // Управление Пакманом
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') { pPos.x += speed; pPos.dir = 0; }
            if (e.key === 'ArrowLeft')  { pPos.x -= speed; pPos.dir = 180; }
            if (e.key === 'ArrowUp')    { pPos.y -= speed; pPos.dir = 270; }
            if (e.key === 'ArrowDown')  { pPos.y += speed; pPos.dir = 90; }

            // Pac-Man Warp Effect (Телепортация сквозь стены)
            if (pPos.x > 600) pPos.x = -40;
            if (pPos.x < -40) pPos.x = 600;
            if (pPos.y > 400) pPos.y = -40;
            if (pPos.y < -40) pPos.y = 400;

            update();
            checkCollisions();
        });

        // Простая логика Призрака (движется за Пакманом)
        function moveGhost() {
            if (gPos.x < pPos.x) gPos.x += 5; else gPos.x -= 5;
            if (gPos.y < pPos.y) gPos.y += 5; else gPos.y -= 5;
            
            ghost.style.left = gPos.x + 'px';
            ghost.style.top = gPos.y + 'px';

            // Если призрак поймал пакмана
            if (Math.abs(gPos.x - pPos.x) < 30 && Math.abs(gPos.y - pPos.y) < 30) {
                alert("MÄNG LÄBI! Sinu skoor: " + score);
                location.reload();
            }
        }
        setInterval(moveGhost, 100);

        function checkCollisions() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach(dot => {
                const dx = parseInt(dot.style.left) - pPos.x;
                const dy = parseInt(dot.style.top) - pPos.y;
                const distance = Math.sqrt(dx*dx + dy*dy);
                
                if (distance < 30) {
                    dot.remove();
                    score += 10;
                    scoreElement.innerText = score;
                }
            });
        }

        function update() {
            pacman.style.left = pPos.x + 'px';
            pacman.style.top = pPos.y + 'px';
            pacman.style.transform = `rotate(${pPos.dir}deg)`;
        }
        update();
    </script>
</body>
</html>
