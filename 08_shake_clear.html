<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Shake to Clear</title>
    <style>
        body { background: #f8fafc; overflow: hidden; height: 100vh; font-family: sans-serif; }
        .container { display: flex; gap: 20px; padding: 50px; flex-wrap: wrap; }
        .item { 
            width: 100px; height: 100px; background: #6366f1; border-radius: 10px;
            transition: transform 0.8s cubic-bezier(0.5, 0.05, 0.1, 1.5), opacity 0.5s;
        }
        .fallen { transform: translateY(120vh) rotate(45deg) !important; opacity: 0; }
    </style>
</head>
<body>
    <h2 style="text-align: center;">Raputa hiirt kiiresti küljelt küljele!</h2>
    <div class="container" id="boxContainer">
        </div>

    <script>
        const container = document.getElementById('boxContainer');
        for(let i=0; i<30; i++) {
            const div = document.createElement('div');
            div.className = 'item';
            container.appendChild(div);
        }

        let lastX = 0;
        let shakeThreshold = 2000; // Порог скорости для "встряски"

        window.addEventListener('mousemove', (e) => {
            let speed = Math.abs(e.clientX - lastX) / 10;
            if (speed > 100) { // Если движение очень быстрое
                const items = document.querySelectorAll('.item');
                items.forEach(item => {
                    item.classList.add('fallen');
                });
                setTimeout(() => {
                    location.reload(); // Перезагрузка через 2 сек, чтобы вернуть блоки
                }, 2000);
            }
            lastX = e.clientX;
        });
    </script>
</body>
</html>
