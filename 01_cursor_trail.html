<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Cursor Trail</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #050505;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: sans-serif;
        }
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #00f2ff;
            border-radius: 50%;
            pointer-events: none; /* Et osakesed ei segaks hiirt */
            transition: transform 0.8s ease-out, opacity 0.8s ease-out;
            box-shadow: 0 0 10px #00f2ff;
        }
    </style>
</head>
<body>
    <h2>Liiguta hiirt!</h2>

    <script>
        document.addEventListener('mousemove', (e) => {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            // Positsioneerime osakese hiire keskele
            particle.style.left = e.clientX + 'px';
            particle.style.top = e.clientY + 'px';
            
            document.body.appendChild(particle);

            // Käivitame animatsiooni viivitusega (next tick)
            requestAnimationFrame(() => {
                particle.style.transform = `translate(${(Math.random() - 0.5) * 100}px, ${(Math.random() - 0.5) * 100}px) scale(0)`;
                particle.style.opacity = '0';
            });

            // Eemaldame elemendi pärast animatsiooni lõppu
            setTimeout(() => {
                particle.remove();
            }, 800);
        });
    </script>
</body>
</html>
