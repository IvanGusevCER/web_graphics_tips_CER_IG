<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Theme Sound</title>
    <style>
        body { 
            transition: background 0.4s, color 0.4s; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            font-family: sans-serif; 
            margin: 0;
        }
        body.dark { background: #1a1a1a; color: #f8fafc; }
        body.light { background: #ffffff; color: #1a1a1a; }
        
        button { 
            padding: 20px 40px; 
            font-size: 1.2rem; 
            cursor: pointer; 
            border-radius: 12px; 
            border: 2px solid currentColor; 
            background: transparent; 
            color: inherit;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body class="light">
    <h1>Teema vahetus heliga</h1>
    <button id="themeBtn">Lülita valgust</button>

    <script>
        const btn = document.getElementById('themeBtn');
        
        // Попытка загрузить стандартный звук клика
        const clickSound = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');

        // Функция для генерации звука программно (Beep), если файл не сработает
        function playFallbackSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            const gain = context.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, context.currentTime); // Высота звука
            
            gain.gain.setValueAtTime(0.1, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);

            oscillator.connect(gain);
            gain.connect(context.destination);

            oscillator.start();
            oscillator.stop(context.currentTime + 0.1);
        }

        btn.addEventListener('click', () => {
            // Пытаемся проиграть файл, если не выходит — играем программный "бип"
            clickSound.play().catch(() => {
                playFallbackSound();
            });

            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
            
            // Меняем текст кнопки для интереса
            btn.innerText = document.body.classList.contains('dark') ? 'Valgus sisse' : 'Valgus välja';
        });
    </script>
</body>
</html>
