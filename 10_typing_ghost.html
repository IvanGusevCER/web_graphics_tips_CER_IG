<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Typing Ghost</title>
    <style>
        body { background: #111; color: #4ade80; display: flex; flex-direction: column; align-items: center; padding-top: 50px; font-family: monospace; }
        #output { font-size: 2rem; margin-top: 20px; min-height: 50px; }
        .char {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
            animation: ghost-in 0.5s forwards;
        }
        @keyframes ghost-in { to { opacity: 1; transform: translateY(0); } }
        input { background: #222; border: 1px solid #4ade80; color: white; padding: 10px; width: 300px; }
    </style>
</head>
<body>
    <input type="text" id="input" placeholder="Kirjuta midagi siia...">
    <div id="output"></div>
    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');

        input.addEventListener('input', (e) => {
            const lastChar = e.data;
            if (lastChar) {
                const span = document.createElement('span');
                span.className = 'char';
                span.innerText = lastChar;
                output.appendChild(span);
            }
            if (input.value === "") output.innerHTML = "";
        });
    </script>
</body>
</html>
