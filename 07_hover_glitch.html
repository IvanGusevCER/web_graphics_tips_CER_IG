<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Glitch Effect</title>
    <style>
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; overflow: hidden; }
        .glitch {
            font-size: 5rem; font-weight: bold; text-transform: uppercase; position: relative; cursor: pointer;
        }
        .glitch:hover { animation: shake 0.2s infinite; }
        .glitch::before, .glitch::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8;
        }
        .glitch:hover::before { left: 2px; text-shadow: -2px 0 red; clip: rect(44px, 450px, 56px, 0); animation: glitch-anim 0.4s infinite linear alternate-reverse; }
        .glitch:hover::after { left: -2px; text-shadow: -2px 0 blue; clip: rect(10px, 450px, 30px, 0); animation: glitch-anim 0.2s infinite linear alternate-reverse; }

        @keyframes shake {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            100% { clip: rect(70px, 9999px, 12px, 0); }
        }
    </style>
</head>
<body>
    <div class="glitch" data-text="GLITCH">GLITCH</div>
</body>
</html>
