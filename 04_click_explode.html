<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Click to Explode</title>
    <style>
        body { margin: 0; height: 100vh; background: #111; overflow: hidden; cursor: crosshair; }
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            transition: transform 1s ease-out, opacity 1s;
        }
    </style>
</head>
<body>

    <script>
        document.addEventListener('click', (e) => {
            const particleCount = 20; // Количество осколков

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Случайный размер и цвет
                const size = Math.random() * 20 + 5;
                const color = `hsl(${Math.random() * 360}, 70%, 60%)`;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.background = color;
                particle.style.left = e.clientX + 'px';
                particle.style.top = e.clientY + 'px';

                document.body.appendChild(particle);

                // Рассчитываем случайный полет
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 200 + 50;
                const destinationX = Math.cos(angle) * velocity;
                const destinationY = Math.sin(angle) * velocity;

                // Запускаем анимацию
                requestAnimationFrame(() => {
                    particle.style.transform = `translate(${destinationX}px, ${destinationY}px) scale(0)`;
                    particle.style.opacity = '0';
                });

                // Удаляем элемент
                setTimeout(() => particle.remove(), 1000);
            }
        });
    </script>
</body>
</html>
